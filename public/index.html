<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🪣 YELLOW BUCKET CHAOS DIMENSION 🪣</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bucket-rain" id="bucket-rain" aria-hidden="true"></div>
    <div class="svg-chaos-layer" id="svg-chaos" aria-hidden="true"></div>
    
    <header>
      <h1 class="glitch-text" data-text="🪣 YELLOW BUCKET CHAOS 🪣">🪣 YELLOW BUCKET CHAOS 🪣</h1>
      <p class="subtitle">where square thoughts rain in buckets of madness</p>
      
      <section id="generation-attraction" aria-live="polite">
        <p class="attraction-label">⚠️ NEXT CHAOS RUPTURE</p>
        <p id="generation-countdown" class="countdown">4:00:00</p>
        <div class="clock-container">
          <p id="big-clock" class="big-clock">--:--:--</p>
        </div>
        <p id="last-summary" class="last-summary">buckets overflow with contradictions...</p>
      </section>
      
      <div class="button-row">
        <button id="new-note-btn" type="button" class="btn-primary">
          <span class="btn-icon">◼</span>
          <span class="btn-text">drop a square thought</span>
        </button>
      </div>
    </header>
    
    <main id="canvas" aria-label="Post-it canvas">
    </main>
    
    <section id="history" aria-label="Site evolution history">
      <h2 class="history-title">
        <span class="history-icon">🪣</span>
        BUCKET ARCHAEOLOGY
        <span class="history-icon">🪣</span>
      </h2>
      <ol id="history-list">
        <li class="history-empty">sifting through bucket sediment...</li>
      </ol>
    </section>
    
    <footer id="site-footer">
      <a href="/logs" id="logs-link" rel="nofollow">🪣 operator logs ↗</a>
    </footer>
    
    <template id="note-template">
      <article class="note" draggable="true">
        <div class="note-grip" aria-hidden="true">▦</div>
        <button class="note-delete" title="Delete this post-it" aria-label="Delete">✖</button>
        <textarea maxlength="500" aria-label="Post-it content" placeholder="pour your thoughts here..."></textarea>
        <div class="note-author" aria-label="Author"></div>
      </article>
    </template>
    
    <script src="/app.js"></script>
  </body>
</html>
