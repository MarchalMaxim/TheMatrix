<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>المصفوفة • TheMatrix</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="arabic-calligraphy" id="arabic-calligraphy" aria-hidden="true"></div>
    
    <header>
      <h1 class="arabic-title">المصفوفة</h1>
      <p class="subtitle">حيث تذوب الأفكار في اللانهاية</p>
      
      <section id="generation-attraction" aria-live="polite">
        <p class="attraction-label">⟡ الانهيار القادم في</p>
        <p id="generation-countdown" class="countdown">4:00:00</p>
        <div class="clock-container">
          <p id="big-clock" class="big-clock">--:--:--</p>
        </div>
        <p id="last-summary" class="last-summary">نستمع إلى الصمت بين الأفكار...</p>
      </section>
      
      <div class="button-row">
        <button id="new-note-btn" type="button" class="btn-primary">
          <span class="btn-icon">⟡</span>
          <span class="btn-text">همس في الفراغ</span>
        </button>
      </div>
    </header>
    
    <main id="canvas" aria-label="لوحة الملاحظات">
    </main>
    
    <section id="history" aria-label="تاريخ تطور الموقع">
      <h2 class="history-title">
        <span class="history-icon">◈</span>
        شظايا الذاكرة
        <span class="history-icon">◈</span>
      </h2>
      <ol id="history-list">
        <li class="history-empty">لا شيء موجود بعد في هذا الفراغ...</li>
      </ol>
    </section>
    
    <footer id="site-footer">
      <a href="/logs" id="logs-link" rel="nofollow">⟡ بوابة المشغل</a>
    </footer>
    
    <template id="note-template">
      <article class="note" draggable="true">
        <div class="note-grip" aria-hidden="true">⟡</div>
        <button class="note-delete" title="حذف هذه الملاحظة" aria-label="حذف">×</button>
        <textarea maxlength="500" aria-label="محتوى الملاحظة" placeholder="همسك..."></textarea>
        <div class="note-author" aria-label="المؤلف"></div>
      </article>
    </template>
    
    <script src="/app.js"></script>
  </body>
</html>
